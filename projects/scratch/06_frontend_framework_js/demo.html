<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Mini Framework Demo</title></head>
  <body>
    <div id="app"></div>
    <script src="framework.js"></script>
    <script>
      const { h, createSignal, mount } = Mini;
      const count = createSignal(0);

      const view = () => h("div", {},
        h("h1", {}, "Count: ", String(count.get())),
        h("button", { onClick: () => count.set(count.get() + 1) }, "Increment")
      );

      mount(document.getElementById("app"), view, count);
    </script>
  </body>
</html>
